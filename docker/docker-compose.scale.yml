version: '3.8'

services:
  load-balancer:
    image: nginx:alpine
    container_name: errdb-load-balancer
    read_only: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-load-balancer.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/ssl/certs:ro
      - ./ssl/private:/etc/ssl/private:ro
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
      - /var/lib/nginx/tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped
    depends_on:
      - backend

  # Backend API (multiple instances)
  # Note: Intentionally no read_only or security_opt to allow:
  # - Writable prisma volume for schema migrations and development
  # - Hot reload capabilities in development environment
  # For production, use docker-compose.prod.yml with hardened settings
  backend:
    image: errdb-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-errdb}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-https://your-domain.com}
      - PORT=3010
    volumes:
      - ./backend/prisma:/app/backend/prisma
    networks:
      - errdb-network
    restart: unless-stopped
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  postgres:
    image: postgres:15-alpine
    container_name: errdb-postgres-primary
    read_only: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-errdb}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped
    deploy:
      placement:
        constraints: [node.role == manager]

  postgres-replica:
    image: postgres:15-alpine
    container_name: errdb-postgres-replica
    read_only: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-errdb}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
    command: >
      bash -c "
      echo \"host replication all 0.0.0.0/0 md5\" >> /var/lib/postgresql/data/pg_hba.conf &&
      docker-entrypoint.sh postgres -c hot_standby=on -c max_standby_streaming_delay=30s
      "
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: errdb-redis-primary
    read_only: true
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped
    deploy:
      replicas: 1

  redis-replica:
    image: redis:7-alpine
    container_name: errdb-redis-replica
    read_only: true
    command: redis-server --appendonly yes --replica-of redis 6379
    volumes:
      - redis_replica_data:/data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped
    depends_on:
      - redis
    deploy:
      replicas: 2

  prometheus:
    image: prom/prometheus:latest
    container_name: errdb-prometheus
    read_only: true
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    tmpfs:
      - /prometheus
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: errdb-grafana
    read_only: true
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_PATHS_LOGS=/var/log/grafana
      - GF_PATHS_PLUGINS=/var/lib/grafana/plugins
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    tmpfs:
      - /tmp
      - /var/log/grafana
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_data:
    driver: local
  redis_replica_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  errdb-network:
    driver: overlay
    attachable: true