version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: errdb-postgres
    read_only: true
    environment:
      POSTGRES_DB: errdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d errdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: errdb-redis
    read_only: true
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - errdb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  # Note: Development build - intentionally no hardening to allow:
  # - Hot reload capabilities via mounted volumes
  # - Prisma schema access and migrations
  # - For production, use docker-compose.prod.yml with hardened settings
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      container_name: errdb-backend
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@postgres:5432/errdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-with-at-least-32-characters
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key-with-at-least-32-characters
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - errdb-network
    command: npm run dev

  # Frontend application
  # Note: Development build - intentionally no hardening to allow:
  # - Hot reload capabilities via mounted volumes
  # - For production, use docker-compose.prod.yml with hardened nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      container_name: errdb-frontend
    ports:
      - "3005:3005"
    environment:
      - VITE_API_BASE_URL=http://localhost:3010/api
      - VITE_APP_NAME=Error Database
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - errdb-network
    command: npm run dev

  # Database management (optional)
  # Note: Intentionally no read_only or security_opt to allow:
  # - pgAdmin internal storage for user settings and sessions
  # Note: This is a development tool, not recommended for production use
  pgadmin:
    image: dpage/pgadmin4
    container_name: errdb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@errdb.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - errdb-network

volumes:
  postgres_data:
  redis_data:

networks:
  errdb-network:
    driver: bridge