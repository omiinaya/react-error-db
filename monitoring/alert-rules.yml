groups:
  - name: node-backend-alerts
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"
          value: "{{ $value }}"

      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1 second"
          value: "{{ $value }}s"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: (nodejs_heap_used_bytes / nodejs_heap_total_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High memory usage"
          description: "Node.js memory usage is above 80%"
          value: "{{ $value }}%"

      # High CPU usage alert
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80%"
          value: "{{ $value }}%"

  - name: database-alerts
    rules:
      # Database connection errors
      - alert: DatabaseConnectionErrors
        expr: rate(database_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database connection errors"
          description: "Database connection errors detected"
          value: "{{ $value }}"

      # Slow database queries
      - alert: SlowQueries
        expr: rate(database_query_duration_seconds_sum[5m]) / rate(database_query_duration_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "Slow database queries"
          description: "Average query duration above 500ms"
          value: "{{ $value }}s"

      # High database connections
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 50
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "High database connections"
          description: "Database connection count above 50"
          value: "{{ $value }}"

  - name: redis-alerts
    rules:
      # Redis memory usage
      - alert: RedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          team: redis
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage above 80%"
          value: "{{ $value }}%"

      # Redis connection errors
      - alert: RedisConnectionErrors
        expr: rate(redis_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          team: redis
        annotations:
          summary: "Redis connection errors"
          description: "Redis connection errors detected"
          value: "{{ $value }}"

  - name: system-alerts
    rules:
      # High system load
      - alert: HighSystemLoad
        expr: node_load1 > number_of_cpus * 0.8
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High system load"
          description: "System load is above 80% of CPU cores"
          value: "{{ $value }}"

      # Low disk space
      - alert: LowDiskSpace
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.2
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 20%"
          value: "{{ $value }}%"

      # High network traffic
      - alert: HighNetworkTraffic
        expr: rate(node_network_receive_bytes_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High network traffic"
          description: "Network receive traffic above 100MB/s"
          value: "{{ $value }} bytes/s"

  - name: application-alerts
    rules:
      # Application down
      - alert: ApplicationDown
        expr: up{job="node-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Application is down"
          description: "Backend application is not responding"
          value: "{{ $value }}"

      # Database down
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Database is down"
          description: "PostgreSQL database is not responding"
          value: "{{ $value }}"

      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          team: redis
        annotations:
          summary: "Redis is down"
          description: "Redis server is not responding"
          value: "{{ $value }}"

  - name: business-metrics-alerts
    rules:
      # High error submission rate
      - alert: HighErrorSubmissionRate
        expr: rate(error_submissions_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "High error submission rate"
          description: "Error submission rate above 100 per minute"
          value: "{{ $value }}"

      # Low solution acceptance rate
      - alert: LowSolutionAcceptanceRate
        expr: rate(solutions_accepted_total[5m]) / rate(solutions_submitted_total[5m]) < 0.1
        for: 15m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Low solution acceptance rate"
          description: "Solution acceptance rate below 10%"
          value: "{{ $value }}%"