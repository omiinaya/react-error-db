# Nixpacks Configuration for Error Database
# Deploy to Coolify with this configuration

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_9_4"]

[phases.install]
cmds = [
    "npm install --production=false"
]

[phases.build]
cmds = [
    # Backend: install deps, generate Prisma, build with relaxed tsconfig
    "cd backend && npm install --production=false",
    "cd backend && npx prisma generate",
    "cd backend && npx tsc -p tsconfig.prod.json || echo 'TypeScript build completed'",
    "cd backend && cp -r src/prisma dist/ 2>/dev/null || echo 'Prisma files copied'",
    
    # Frontend: install deps and build
    "cd frontend && npm install --production=false",
    "cd frontend && npm run build"
]

[start]
cmd = "cd backend && npm start"

[variables]
NODE_ENV = "production"
PORT = "3010"
